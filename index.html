<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#9E70A1" />
    <meta
      name="description"
      content="International Network for Single Mothers Uganda Chapter empowers mothers to become an economic force in Uganda."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://insmuganda.org/" />
    <meta
      property="og:title"
      content="INSM Uganda | Empowering Single Mothers"
    />
    <meta
      property="og:description"
      content="Empowering single mothers to become an economic force in Uganda through cooperative action and financial literacy."
    />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="INSM Uganda | Empowering Single Mothers"
    />
    <meta
      name="twitter:description"
      content="Empowering single mothers to become an economic force in Uganda."
    />
    <meta name="twitter:image" content="/logo.png" />

    <title>INSM Uganda</title>
  </head>
  <body>
    <!-- A little help for the Netlify post-processing bots to detect the form at build time -->
    <form name="contact" data-netlify="true" hidden>
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
